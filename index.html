<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DamirTech | Future IT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        .hero-content { position: relative; z-index: 10; pointer-events: none; width: 100%; }
        .hero-content a, .hero-content button { pointer-events: auto; }
        .glass-nav { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); }
    </style>
</head>
<body class="bg-black text-white">

    <nav class="glass-nav p-4 sticky top-0 z-50 border-b border-white/10">
        <div class="container mx-auto flex justify-between items-center px-4">
            <div class="text-xl font-black tracking-tighter uppercase">DAMIR<span class="text-blue-500">TECH</span></div>
            <div class="flex space-x-6 text-[10px] md:text-[12px] uppercase font-bold tracking-widest text-gray-400">
                <a href="index.html" class="text-white">Главная</a>
                <a href="about.html" class="hover:text-blue-400 transition">О нас</a>
                <a href="services.html" class="hover:text-blue-400 transition">Услуги</a>
            </div>
            <a href="https://wa.me/77715224428" class="hidden md:block bg-blue-600 px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition hover:bg-blue-500">Связаться</a>
        </div>
    </nav>

    <header id="hero-canvas-container" class="relative h-screen flex items-center justify-center overflow-hidden border-b border-white/5">
        <div class="container mx-auto px-4 text-center hero-content">
            <h1 class="text-5xl md:text-9xl font-black mb-6 tracking-tighter leading-none text-white uppercase">
                DAMIR<span class="text-blue-600">TECH</span><br>
                <span class="text-lg md:text-5xl font-light text-gray-500 uppercase tracking-[0.5em] md:tracking-[0.8em] block mt-4 w-full text-center">Astana</span>
            </h1>
            <p class="text-gray-400 text-base md:text-xl mb-12 max-w-xl mx-auto font-light leading-relaxed">
                Мы создаем не просто сайты. Мы создаем цифровые миры. 
            </p>
            <div class="flex flex-col md:flex-row justify-center gap-6">
                <a href="services.html" class="bg-white text-black px-12 py-5 rounded-full font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white transition transform hover:scale-105">Наши услуги</a>
                <a href="https://wa.me/77715224428" target="_blank" class="border border-white/20 text-white px-12 py-5 rounded-full font-black uppercase tracking-widest hover:bg-white hover:text-black transition">WhatsApp</a>
            </div>
        </div>
    </header>

    <script>
        const container = document.getElementById('hero-canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const geometry = new THREE.SphereGeometry(1.6, 64, 64); 
        const material = new THREE.PointsMaterial({ color: 0x2563eb, size: 0.02, transparent: true, opacity: 0.6 });
        const sphere = new THREE.Points(geometry, material);
        scene.add(sphere);
        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            sphere.rotation.y += 0.002;
            sphere.rotation.x += 0.001;
            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        animate();
    </script>
</body>
</html>
